name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app
        run: |
          chmod +x apps/macos/build.sh
          apps/macos/build.sh
          rm -rf plugin/assets/Codex\ Usage\ Monitor.app
          mkdir -p plugin/assets
          cp -R apps/macos/build/Codex\ Usage\ Monitor.app plugin/assets/

      - name: Package plugin
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent apps/macos/build/Codex\ Usage\ Monitor.app dist/Codex-Usage-Monitor-macOS.zip
          ditto -c -k --sequesterRsrc --keepParent plugin dist/codex-usage-monitor-plugin.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.zip --generate-notes --title "Codex Usage Monitor ${GITHUB_REF_NAME}"
